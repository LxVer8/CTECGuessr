<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>CTECGuessr</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:," />
</head>
<body>

  <!-- Menu markup disabled for debug.
      <div id="multiplayer-section" style="display: none; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px;">
        <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
          <div style="flex: 1; min-width: 200px; text-align: center;">
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
              <input type="text" id="room-code-input" placeholder="Enter Room Code" style="padding: 8px 12px; border-radius: 4px; border: 1px solid #666; background: #2a2a2a; color: white; width: 150px;">
              <button id="join-room-btn" style="padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;">Join Room</button>
              <button id="create-room-btn" style="padding: 8px 16px; background: #22c55e; color: white; border: none; border-radius: 4px; cursor: pointer;">+ Create</button>
            </div>
            <div id="room-feedback" style="margin-top: 10px; font-size: 14px; color: #fbbf24;"></div>
            <div id="room-code-display" style="margin-top: 5px; font-size: 18px; font-weight: bold; color: #60a5fa;"></div>
          </div>
          <div id="lobby-panel" style="flex: 1; min-width: 180px; background: #1e1e2e; padding: 12px 16px; border-radius: 8px; border: 1px solid #333;">
            <h4 style="margin:0 0 10px 0; color: #fff; text-align: center;">👥 Players in Lobby</h4>
            <table id="lobby-table" style="width:100%; color:#ccc; border-collapse:collapse; text-align:left;">
              <thead><tr><th style="border-bottom:1px solid #444; padding-bottom:4px;">Name</th><th style="border-bottom:1px solid #444; padding-bottom:4px; text-align:center;">Status</th></tr></thead>
              <tbody id="lobby-tbody"><tr><td colspan="2" style="text-align:center; color:#666; padding-top:10px;">Waiting for players...</td></tr></tbody>
            </table>
            <button id="start-game-btn" style="margin-top: 12px; width: 100%; padding: 8px; background: #facc15; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: none;">🚀 Start Game</button>
          </div>
        </div>
      </div>

    </div> <!-- /menu-card -->
  </div> <!-- /menu-overlay -->
  -->

  <!-- ===== END SCREEN ===== -->
  <div id="end-screen" style="display:none;">
    <div class="end-card">
      <h2>Round Complete!</h2>
      <p class="final-score">Final Score: <span id="final-score">0</span></p>
      <div id="end-summary">
        <table>
          <thead><tr><th>#</th><th>Location</th><th>Your Guess</th><th>Distance</th><th>Points</th></tr></thead>
          <tbody id="end-table-body"></tbody>
        </table>
      </div>
      <button id="play-again-btn">Play Again</button>
    </div>
  </div>

  <!-- ===== GAME CONTAINER ===== -->
  <div id="game-container">
    <div id="panorama-container"></div>

    <div id="compass-container">
      <div class="compass-outer">
        <div class="compass-label-n">N</div>
        <div class="compass-label-s">S</div>
        <div class="compass-label-e">E</div>
        <div class="compass-label-w">W</div>
        <div class="compass-needle" id="compass-needle"></div>
        <div class="compass-ring"></div>
      </div>
    </div>

    <div id="map-corner">
      <div id="map-wrapper">
        <div id="map-inner">
          <img id="map-image" src="map.png" alt="Game Map" />
          <div id="guess-pin" class="pin guess-pin" style="display:none;"></div>
          <div id="actual-pin" class="pin actual-pin" style="display:none;"></div>
          <svg id="connection-line" style="position:absolute;top:0;left:0;width:100%;height:100%;">
            <line x1="0" y1="0" x2="0" y2="0" stroke="white" stroke-dasharray="5,4" stroke-linecap="round" />
          </svg>
        </div>
      </div>
      <div id="controls">
        <div style="display: flex; justify-content: space-between; padding: 0 4px 4px 4px; font-weight: 600; color: #e2e8f0;">
          <span>📍 Round: <span id="round-val">0</span></span>
          <span>⭐ Score: <span id="score-val">0</span></span>
        </div>
        <div id="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#ef4444;"></div> Your guess</div>
          <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div> Location</div>
        </div>
        <div id="feedback"></div>
        <button id="action-btn" disabled>Guess</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <!-- Three.js import map -->
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
  </script>

  <!-- Main entry point -->
  <script type="module">
    import './src/firebase.js';
    import { startGame } from './src/game.js';
    startGame({ dimension: 'overworld', gamemode: 'infinite', roundCount: Infinity });
  </script>
</body>
</html>
